<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 보험 설계사 - 맞춤형 보험 추천</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Landing Section -->
    <div id="landing" class="landing">
        <div class="landing-content">
            <div class="landing-icon">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                    <circle cx="32" cy="32" r="30" stroke="#4F6BFF" stroke-width="2.5" fill="#EEF1FF"/>
                    <path d="M32 18v10M32 36v2M22 28c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10" stroke="#4F6BFF" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M20 42c2-4 6.5-7 12-7s10 3 12 7" stroke="#4F6BFF" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>AI 보험 설계사</h1>
            <p class="landing-subtitle">몇 가지 질문에 답하면, AI가 당신에게 꼭 맞는<br>보험 포트폴리오를 설계해 드립니다.</p>
            <div class="feature-cards">
                <div class="feature-card">
                    <div class="feature-icon">&#128202;</div>
                    <h3>맞춤 분석</h3>
                    <p>나이, 직업, 가족 구성 등을 고려한 개인화 설계</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">&#128176;</div>
                    <h3>예산 최적화</h3>
                    <p>월 예산에 맞춘 최적의 보장 조합 추천</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">&#128737;</div>
                    <h3>보장 분석</h3>
                    <p>사각지대 없는 종합적인 보장 설계</p>
                </div>
            </div>
            <button id="startBtn" class="start-btn">무료 보험 설계 시작하기</button>
            <p class="landing-note">소요시간 약 3분 | 개인정보는 저장되지 않습니다</p>
        </div>
    </div>

    <!-- Chat Section -->
    <div id="chatSection" class="chat-section hidden">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <div class="bot-avatar-sm">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="11" fill="#4F6BFF"/>
                        <path d="M12 7v4M12 14v1M9 11a3 3 0 116 0 3 3 0 01-6 0z" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div>
                    <span class="header-title">AI 보험 설계사</span>
                    <span class="header-status">온라인</span>
                </div>
            </div>
            <button id="resetBtn" class="reset-btn" title="처음부터 다시 시작">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M1 4v6h6M23 20v-6h-6"/>
                    <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                </svg>
            </button>
        </header>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
            <span id="progressText" class="progress-text">질문 1/7</span>
        </div>

        <!-- Chat Messages -->
        <div id="chatMessages" class="chat-messages">
        </div>

        <!-- Input Area -->
        <div id="inputArea" class="input-area">
            <!-- Dynamic input will be rendered here -->
        </div>
    </div>

    <!-- Result Section -->
    <div id="resultSection" class="result-section hidden">
        <header class="chat-header">
            <div class="header-left">
                <div class="bot-avatar-sm">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="11" fill="#4F6BFF"/>
                        <path d="M12 7v4M12 14v1M9 11a3 3 0 116 0 3 3 0 01-6 0z" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div>
                    <span class="header-title">AI 보험 설계사</span>
                    <span class="header-status">설계 완료</span>
                </div>
            </div>
            <button id="restartBtn" class="reset-btn" title="다시 설계하기">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M1 4v6h6M23 20v-6h-6"/>
                    <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                </svg>
            </button>
        </header>
        <div id="resultContent" class="result-content">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
