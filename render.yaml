# ==========================================================
# Render Blueprint — 프론트+백엔드 한 번에 배포
# ----------------------------------------------------------
# 사용법:
#   1. Render Dashboard → New → Blueprint → 본 레포 선택
#   2. 생성된 두 서비스의 Environment 탭에서
#      sync: false 로 표시된 값들을 수동 입력
#       • 백엔드: API 키 6개 + CORS_ORIGINS(프론트 공개 URL)
#       • 프론트: BACKEND_URL(백엔드 공개 URL, https:// 포함)
#
# 참고: fromService.property 는 Render 내부 호스트명만 반환하고
#       .onrender.com 이 붙은 공개 URL 은 반환하지 않으므로
#       BACKEND_URL/CORS_ORIGINS 는 sync:false 로 수동 입력 방식이 안전.
# ==========================================================

services:
  # ─── 백엔드 (FastAPI) ─────────────────────────────────
  - type: web
    name: insurance-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --app-dir backend --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEAVIATE_URL
        sync: false
      - key: WEAVIATE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # 프론트엔드의 공개 URL. 여러 개면 콤마 구분.
      # 예: https://insurance-frontend-xxx.onrender.com
      - key: CORS_ORIGINS
        sync: false

  # ─── 프론트엔드 (Next.js) ─────────────────────────────
  - type: web
    name: insurance-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      # 백엔드의 공개 URL. 반드시 https:// 포함한 전체 주소.
      # 예: https://insurance-backend-xxx.onrender.com
      - key: BACKEND_URL
        sync: false
