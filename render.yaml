# ==========================================================
# Render Blueprint — 프론트+백엔드 한 번에 배포
# ----------------------------------------------------------
# 사용법:
#   1. Render Dashboard → New → Blueprint → 본 레포 선택
#   2. 생성된 두 서비스의 Environment 탭에서
#      sync: false 로 표시된 값들(API 키)만 입력
#   3. BACKEND_URL 은 자동으로 주입되므로 손댈 필요 없음
# ==========================================================

services:
  # ─── 백엔드 (FastAPI) ─────────────────────────────────
  - type: web
    name: insurance-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --app-dir backend --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEAVIATE_URL
        sync: false
      - key: WEAVIATE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CORS_ORIGINS
        # 프론트 서비스 호스트를 자동 주입
        fromService:
          type: web
          name: insurance-frontend
          property: host

  # ─── 프론트엔드 (Next.js) ─────────────────────────────
  - type: web
    name: insurance-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: BACKEND_URL
        # 백엔드 서비스 호스트를 자동 주입 (https:// 는 프론트 코드에서 보정)
        fromService:
          type: web
          name: insurance-backend
          property: host
